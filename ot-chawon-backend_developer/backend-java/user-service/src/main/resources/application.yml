spring:
  application:
    name: user-service
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/otc_user_db?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME:otc_user}
    password: ${DB_PASSWORD:secret}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8081

otc:
  jwt:
    secret: ${OTC_JWT_SECRET}
    access-token-expiry-ms: 900000       # 15분
    refresh-token-expiry-ms: 604800000   # 7일
  body:
    enc-key: ${OTC_BODY_ENC_KEY}

management:
  endpoints:
    web:
      exposure:
        include: health,info
