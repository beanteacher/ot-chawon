server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: user-service-auth
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - StripPrefix=0

        - id: user-service-auth-direct
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=0

        - id: user-service-users
          uri: http://localhost:8081
          predicates:
            - Path=/api/v1/users/**
          filters:
            - StripPrefix=0

        - id: product-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/v1/products/**
          filters:
            - StripPrefix=0

        - id: order-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/orders/**
          filters:
            - StripPrefix=0

        - id: order-service-direct
          uri: http://localhost:8083
          predicates:
            - Path=/api/orders/**
          filters:
            - StripPrefix=0

        - id: cart-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/carts/**
          filters:
            - StripPrefix=0

        - id: cart-service-v1
          uri: http://localhost:8083
          predicates:
            - Path=/api/v1/carts/**
          filters:
            - StripPrefix=0

        - id: payment-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/v1/payments/**
          filters:
            - StripPrefix=0

        - id: fitting-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/v1/fitting/**
          filters:
            - StripPrefix=0

        - id: brand-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/v1/brands/**
          filters:
            - StripPrefix=0

jwt:
  secret: ${JWT_SECRET:otchawon-secret-key-must-be-at-least-256-bits-long-for-hs256}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.otchawon.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
