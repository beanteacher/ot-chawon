server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
            maxAge: 3600
      routes:
        - id: ai-server-static
          uri: ${AI_SERVER_URL:http://localhost:8090}
          predicates:
            - Path=/static/fits/**
          filters:
            - StripPrefix=0

        - id: user-service-auth
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - StripPrefix=0

        - id: user-service-auth-direct
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=0

        - id: user-service-users
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/users/**
          filters:
            - StripPrefix=0

        - id: product-service
          uri: ${PRODUCT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/products/**
          filters:
            - StripPrefix=0

        - id: order-service
          uri: ${ORDER_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/orders/**
          filters:
            - StripPrefix=0

        - id: order-service-direct
          uri: ${ORDER_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/orders/**
          filters:
            - StripPrefix=0

        - id: cart-service
          uri: ${ORDER_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/carts/**
          filters:
            - StripPrefix=0

        - id: cart-service-v1
          uri: ${ORDER_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/carts/**
          filters:
            - StripPrefix=0

        - id: payment-service
          uri: ${PAYMENT_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/v1/payments/**
          filters:
            - StripPrefix=0

        - id: payment-service-direct
          uri: ${PAYMENT_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/payments/**
          filters:
            - StripPrefix=0

        - id: fitting-service
          uri: ${FITTING_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/v1/fittings/**
          filters:
            - StripPrefix=0

        - id: fitting-service-legacy
          uri: ${FITTING_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/v1/fitting/**
          filters:
            - StripPrefix=0

        - id: brand-service
          uri: ${BRAND_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/api/v1/brands/**
          filters:
            - StripPrefix=0

        - id: product-asset-service
          uri: ${PRODUCT_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/assets/**,/api/v1/products/*/assets/**
          filters:
            - StripPrefix=0

jwt:
  secret: ${JWT_SECRET:otchawon-secret-key-must-be-at-least-256-bits-long-for-hs256}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.otchawon.gateway: DEBUG
    org.springframework.cloud.gateway: DEBUG
