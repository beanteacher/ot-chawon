<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #111111; color: #F9F9F9; font-family: -apple-system, sans-serif; font-size: 13px; padding: 20px; }
  h2 { font-size: 16px; font-weight: 700; color: #F9F9F9; margin-bottom: 4px; }
  p { color: #9E9E9E; font-size: 11px; margin-bottom: 16px; }
  .btn { display: block; width: 100%; padding: 10px 16px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; margin-bottom: 8px; transition: opacity 0.15s; }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: #F9F9F9; color: #111111; }
  .btn-secondary { background: #212121; color: #F9F9F9; border: 1px solid #616161; }
  .btn-ghost { background: transparent; color: #9E9E9E; border: 1px solid #333333; }
  .divider { height: 1px; background: #333333; margin: 12px 0; }
  .label { font-size: 10px; color: #616161; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
</style>
</head>
<body>
  <h2>로그인 / 회원가입</h2>
  <p>로그인/회원가입 페이지 · 6개 프레임</p>
  <button class="btn btn-primary" onclick="send('all')">전체 프레임 생성 (6개)</button>
  <div class="divider"></div>
  <div class="label">카테고리별 생성</div>
  <button class="btn btn-secondary" onclick="send('auth')">인증 페이지 전체 (6개)</button>
  <div class="divider"></div>
  <button class="btn btn-ghost" onclick="send('close')">닫기</button>
  <script>
    function send(type) {
      parent.postMessage({ pluginMessage: { type: type } }, "*");
    }
  </script>
</body>
</html>
