<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #111111;
    color: #F9F9F9;
    font-family: -apple-system, sans-serif;
    font-size: 13px;
    padding: 20px;
  }
  .header { margin-bottom: 16px; }
  h2 { font-size: 15px; font-weight: 700; color: #F9F9F9; margin-bottom: 4px; }
  .meta { color: #616161; font-size: 11px; }
  .badge {
    display: inline-block;
    background: #1a1a1a;
    border: 1px solid #333333;
    color: #FF6B35;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 99px;
    margin-left: 6px;
    vertical-align: middle;
  }
  .btn {
    display: block;
    width: 100%;
    padding: 10px 16px;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    margin-bottom: 8px;
    transition: opacity 0.15s;
    text-align: left;
  }
  .btn:hover { opacity: 0.82; }
  .btn-primary   { background: #F9F9F9; color: #111111; text-align: center; }
  .btn-secondary { background: #212121; color: #F9F9F9; border: 1px solid #616161; }
  .btn-ghost     { background: transparent; color: #9E9E9E; border: 1px solid #333333; text-align: center; }
  .btn-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 8px;
    vertical-align: middle;
    position: relative;
    top: -1px;
  }
  .dot-table  { background: #3B82F6; }
  .dot-mobile { background: #FF6B35; }
  .dot-filter { background: #34C859; }
  .dot-empty  { background: #F5C518; }
  .divider { height: 1px; background: #222222; margin: 12px 0; }
  .label {
    font-size: 10px;
    color: #616161;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 8px;
  }
  .frame-count {
    float: right;
    font-size: 10px;
    color: #616161;
    font-weight: 400;
    text-transform: none;
    letter-spacing: 0;
  }
</style>
</head>
<body>
  <div class="header">
    <h2>테이블 컴포넌트 <span class="badge">Hi-Fi</span></h2>
    <p class="meta">정렬 · 페이지네이션 · 필터링 · 모바일 · 빈 상태 &nbsp;·&nbsp; 4개 프레임</p>
  </div>

  <button class="btn btn-primary" onclick="send('all')">전체 프레임 생성 (4개)</button>

  <div class="divider"></div>
  <div class="label">카테고리별 생성 <span class="frame-count">각 1개</span></div>

  <button class="btn btn-secondary" onclick="send('table')">
    <span class="btn-dot dot-table"></span>Table-PC &nbsp;— 기본 테이블 + 정렬 + 페이지네이션
  </button>
  <button class="btn btn-secondary" onclick="send('mobile')">
    <span class="btn-dot dot-mobile"></span>Table-Mobile &nbsp;— 카드형 전환 레이아웃
  </button>
  <button class="btn btn-secondary" onclick="send('filter')">
    <span class="btn-dot dot-filter"></span>Table-FilterStates &nbsp;— 텍스트 / 드롭다운 / 날짜
  </button>
  <button class="btn btn-secondary" onclick="send('empty')">
    <span class="btn-dot dot-empty"></span>Table-EmptyState &nbsp;— 빈 상태 UI
  </button>

  <div class="divider"></div>
  <button class="btn btn-ghost" onclick="send('close')">닫기</button>

  <script>
    function send(type) {
      parent.postMessage({ pluginMessage: { type: type } }, "*");
    }
  </script>
</body>
</html>
